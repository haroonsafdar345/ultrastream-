<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraStream - Watch YouTube Videos Without Ads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8B5CF6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UltraStream">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="gradient-sphere sphere-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Particles Container -->
    <div id="particles-container"></div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-play-circle"></i>
                </div>
                <h1 class="logo-text">
                    <span class="logo-ultra">Ultra</span><span class="logo-stream">Stream</span>
                </h1>
            </div>
            <div class="header-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Secure Streaming</span>
            </div>
        </header>

        <!-- Main Card -->
        <div class="glass-card">
            <div class="card-inner">
                <!-- Input Section -->
                <div class="input-section">
                    <div class="input-label-container">
                        <div class="input-icon-wrapper">
                            <i class="fas fa-link"></i>
                        </div>
                        <h2 class="input-title">Paste YouTube Link</h2>
                    </div>
                    
                    <div class="url-input-group">
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="youtubeUrl" 
                                placeholder="https://www.youtube.com/watch?v=..."
                                class="url-input"
                                autocomplete="off"
                            />
                            <div class="input-glow"></div>
                        </div>
                        <button id="playBtn" class="play-button">
                            <div class="button-content">
                                <i class="fas fa-play"></i>
                                <span>Play</span>
                            </div>
                            <div class="button-ripple"></div>
                        </button>
                    </div>

                    <!-- Error Message -->
                    <div id="errorMessage" class="error-message hidden">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="errorText"></span>
                    </div>

                    <!-- Info Bar -->
                    <div class="info-bar">
                        <div class="info-item">
                            <i class="fas fa-check-circle"></i>
                            <span>No Ads</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-hd"></i>
                            <span>High Quality</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-bolt"></i>
                            <span>Fast Streaming</span>
                        </div>
                    </div>
                </div>

                <!-- Video Player Section -->
                <div id="playerSection" class="player-section hidden">
                    <div class="player-header">
                        <div class="player-status">
                            <div class="status-dot"></div>
                            <span>LIVE</span>
                        </div>
                        <button id="closePlayer" class="close-button">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="player-wrapper">
                        <div class="player-ratio">
                            <div id="playerContainer" class="player-container">
                                <!-- YouTube player will load here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Decorative Corners -->
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
        </div>

        <!-- Features Section -->
        <div class="features-section">
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-ad"></i>
                    <div class="feature-icon-x"></div>
                </div>
                <h3>Ad-Free</h3>
                <p>Watch videos without any interruption</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-shield-haltered"></i>
                </div>
                <h3>100% Secure</h3>
                <p>Your data is safe and private</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-gauge-high"></i>
                </div>
                <h3>High Speed</h3>
                <p>Ultra-fast streaming experience</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 UltraStream | For Long Videos Only</p>
        </footer>
    </div>

    <!-- Custom Notification -->
    <div id="notification" class="notification hidden">
        <div class="notification-content">
            <i id="notificationIcon" class="fas"></i>
            <span id="notificationText"></span>
        </div>
        <div class="notification-progress"></div>
    </div>

    <script src="script.js"></script>
</body>
              </html>
